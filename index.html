<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去トレ記録シート</title>
<style>
:root{
  --blue:#1565C0;--blue-lt:#E3F2FD;--blue-md:#90CAF9;
  --red:#C62828;--red-lt:#FFEBEE;--red-md:#EF9A9A;
  --orange:#E65100;--orange-lt:#FFF3E0;
  --green:#2E7D32;--green-lt:#E8F5E9;
  --purple:#6A1B9A;--purple-lt:#F3E5F5;
  --warn:#F57F17;--warn-lt:#FFF8E1;
  --gray:#546E7A;--gray-lt:#ECEFF1;
  --border:#CFD8DC;
  --bg:#F0F4F8;--card:#FFF;--text:#1A2332;--sub:#607D8B;--muted:#B0BEC5;
  --shadow:0 1px 4px rgba(0,0,0,.10);
  --font:'Meiryo','Hiragino Sans','Yu Gothic UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-width:920px}
.app{max-width:1600px;margin:0 auto;padding:10px 12px}
.card{background:var(--card);border-radius:8px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.ch{padding:8px 14px;font-weight:700;font-size:13px;background:#F5F7FA;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cb{padding:10px 14px}
.ctrl-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 14px}
.ctrl{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ctrl label{font-weight:700;font-size:13px;color:var(--sub)}
input[type=number],input[type=text]{font-family:var(--font);font-size:13px;border:1.5px solid var(--border);border-radius:5px;padding:4px 7px;background:#fff;color:var(--text);transition:border-color .15s}
input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--blue)}
textarea{font-family:var(--font);font-size:11px;border:1.5px solid var(--border);border-radius:5px;padding:6px;resize:vertical;color:var(--text)}
textarea:focus{outline:none;border-color:var(--blue)}
.btn{font-family:var(--font);font-size:13px;padding:5px 13px;border:none;border-radius:5px;cursor:pointer;font-weight:700;transition:filter .1s,transform .08s}
.btn:not(:disabled):hover{filter:brightness(1.08)}
.btn:not(:disabled):active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:default}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--sub)}
.btn-outline:hover{background:var(--gray-lt)}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-xs{padding:1px 6px;font-size:10.5px;border-radius:4px}
.layout{display:flex;gap:10px;align-items:flex-start;min-width:0}
.left-panel{flex:1 1 auto;min-width:0;overflow-x:hidden}
.right-panel{flex:0 0 540px;width:540px;min-width:540px}
.memo-sticky{position:sticky;top:10px;align-self:flex-start}

/* TABLE */
.table-wrap{overflow-x:auto}
table.trade{border-collapse:collapse;font-size:12px}
table.trade th,table.trade td{border:1px solid var(--border);padding:3px 6px;text-align:center;vertical-align:middle;white-space:nowrap}
table.trade th{background:#F5F7FA;font-weight:700;color:var(--sub);font-size:12px}
table.trade tr:hover td{background:#FAFCFF}
table.trade tr.row-ryodate td{background:#F3E5F5!important}
table.trade tr.row-ryodate:hover td{background:#EDE7F6!important}
.cd{width:58px}.cp{width:66px}.cdf{width:58px}.cob{width:32px}.cos{width:32px}
.cs{width:260px;text-align:left!important}.cpr{width:80px}.cpd{width:72px}.chl{width:90px}


/* ORDER BTN */
.ord-btn{width:26px;height:24px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;font-size:14px;font-weight:900;background:#FAFAFA;display:inline-flex;align-items:center;justify-content:center;transition:all .12s}
.ob{background:var(--blue-lt)!important;border-color:var(--blue)!important;color:var(--blue)!important}
.os{background:var(--red-lt)!important;border-color:var(--red)!important;color:var(--red)!important}

/* PRICE */
.ph{color:transparent;background:#E8EDF2;border-radius:3px;padding:0 4px;user-select:none}
.up{color:var(--red);font-weight:700}
.dn{color:var(--blue);font-weight:700}

/* SETTLE */
.sl{font-size:11.5px}
.si{display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid #F0F4F8;flex-wrap:wrap}
.si:last-child{border-bottom:none}
.si.auto-si{background:var(--warn-lt);border-radius:4px;padding:2px 4px;margin:1px 0;border:1px solid #FFE082}
.tb{color:var(--blue);font-weight:900}
.ts{color:var(--red);font-weight:900}
.brm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;padding:0 2px;transition:color .1s}
.brm:hover{color:var(--red)}
.auto-tag{font-size:9px;background:var(--warn-lt);color:var(--warn);border:1px solid #FFE082;border-radius:3px;padding:0 3px;font-weight:700}
.expiry-warn{font-size:9px;color:var(--red);font-weight:700;background:var(--red-lt);border-radius:3px;padding:1px 4px;display:inline-block;margin-left:2px}
.ryodate-tag{font-size:9px;background:var(--purple-lt);color:var(--purple);border-radius:3px;padding:0 3px;border:1px solid #CE93D8;font-weight:700}

/* SETTLE FORM */
.sf{background:var(--orange-lt);border:1.5px solid #FFCC80;border-radius:6px;padding:7px 9px;margin-top:4px;font-size:10.5px}
.sf .pl{border:1px solid var(--border);border-radius:4px;max-height:150px;overflow-y:auto;margin-bottom:6px;background:#fff}
.rule3-warn{background:var(--warn-lt);border:2px solid #FFB300;border-radius:6px;padding:6px 10px;margin-top:4px;font-size:11px;color:var(--warn);font-weight:700}
.rule3-ok{font-size:10px;color:var(--green);background:var(--green-lt);border-radius:3px;padding:1px 5px;margin-left:4px}
.rule3-ng{font-size:10px;color:var(--red);background:var(--red-lt);border-radius:3px;padding:1px 5px;margin-left:4px}
.pi2{padding:3px 10px;cursor:pointer;display:flex;gap:7px;align-items:center;flex-wrap:nowrap;white-space:nowrap;border-bottom:1px solid #F5F7FA;transition:background .1s}
.pi2:last-child{border-bottom:none}
.pi2:hover{background:#F5F7FA}
.pi2.sel{background:var(--blue-lt)}
.pi2.expiring{background:#FFF8E1}
.sf .row2{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sf .row2 input{width:90px}
.sf .btns{display:flex;gap:6px}
.ppos{color:var(--red);font-weight:700}
.pneg{color:var(--blue);font-weight:700}

/* MEMO GRID */
.memo-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 14px;background:#F5F7FA;border-bottom:1px solid var(--border)}
.memo-title{font-size:14px;font-weight:700}
.memo-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.memo-meta input{width:78px}
.g-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 14px;min-width:380px}
.gc{border:2px solid var(--border);border-radius:7px;overflow:hidden;font-size:11px;transition:border-color .2s,box-shadow .2s}
.gc.cur{border-color:var(--orange)!important;box-shadow:0 0 0 3px #FF980033}
.gc.done{border-color:#A5D6A7}
.gh{background:#F5F7FA;padding:3px 7px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:12px}
.gc.cur .gh{background:var(--orange-lt)}
.gc.done .gh{background:var(--green-lt);color:var(--green)}
.gc-cols{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.gch{text-align:center;padding:2px 3px;font-weight:700;font-size:10px}
.gch.buy{color:var(--blue);border-right:1px solid var(--border)}
.gch.sell{color:var(--red)}
.gc-rows{display:grid;grid-template-columns:1fr 1fr}
.gcol{display:flex;flex-direction:column}
.gcol:first-child{border-right:1px solid #E8EDF2}
.ge{min-height:22px;padding:2px 5px;border-bottom:1px solid #F0F4F8;display:flex;flex-direction:column;justify-content:center}
.ge:last-child{border-bottom:none}
.ge.stl{text-decoration:line-through;color:var(--muted)!important;background:#FAFCFF}
.ge.stl .gep,.ge.stl .ged{color:var(--muted)!important}
.ge.stl .ge-fukumi{color:inherit!important;text-decoration:line-through}
.ge.auto-stl{background:#FFF8E1!important}
/* 持ち越しスタイル */
.ge.ge-carry{background:#F0FFF4!important;border-left:2px solid #81C784}
.ge-carry-badge{font-size:8px;color:var(--green);font-weight:700;line-height:1;margin-bottom:1px}
.badge-carry{background:#E8F5E9;color:var(--green);border:1px solid #A5D6A7}
.ged{font-size:9px;color:var(--sub)}
.gep{font-weight:700;font-size:11.5px}
.ge.buy-e .gep{color:var(--blue)}
.ge.sell-e .gep{color:var(--red)}
.ge-exp{font-size:8px;color:var(--warn);font-weight:700}
.ge-fukumi{font-size:9px;font-weight:700;line-height:1.2}

/* BOTTOM */
.bot-row{display:flex;gap:10px;flex-wrap:wrap}
.bot-row .card{flex:1;min-width:190px}
.total-bar{display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:11px 18px}
.tc{display:flex;align-items:center;gap:8px}
.tc label{font-weight:700;white-space:nowrap;font-size:12px}
.tc input{width:115px;text-align:right}
.tbig{font-size:16px;font-weight:700}
.op{font-size:20px;font-weight:700;color:var(--muted)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:5px}
.pi3{display:flex;align-items:center;gap:4px;font-size:11px}
.pi3 label{min-width:38px;color:var(--sub)}
.pi3 input{width:66px}

/* IMPORT（ペーストのみ） */
.imp-paste-area{width:100%;height:110px;font-size:11px;font-family:var(--mono,'Courier New',monospace)}
.imp-hint{font-size:10px;color:var(--sub);margin-bottom:6px;line-height:1.6}
.imp-stat{font-size:11px;padding:6px 10px;border-radius:5px;margin-top:8px;font-weight:700}
.imp-stat.ok{background:var(--green-lt);color:var(--green)}
.imp-stat.err{background:var(--red-lt);color:var(--red)}
.imp-stat.warn{background:var(--warn-lt);color:var(--warn)}
.imp-preview{max-height:80px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;margin-top:6px;font-size:10px}
.imp-prow{display:flex;gap:12px;padding:2px 8px;border-bottom:1px solid #F5F7FA}
.imp-prow:last-child{border-bottom:none}
.imp-prow:nth-child(even){background:#FAFBFC}
.mono{font-family:var(--mono,'Courier New',monospace)}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700}
.badge-orange{background:var(--orange-lt);color:var(--orange)}
.badge-green{background:var(--green-lt);color:var(--green)}
.tag-note{font-size:10px;color:var(--sub);background:var(--gray-lt);border-radius:4px;padding:1px 6px}

/* EXPIRE BANNER */
.expire-banner{background:var(--warn-lt);border:2px solid #FFB300;border-radius:8px;padding:9px 14px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--warn);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.expire-banner .items{font-weight:400;font-size:11px;color:var(--text)}

/* FIXED REVEAL BUTTON */
.fixed-reveal{position:fixed;bottom:22px;right:22px;z-index:1000;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.fixed-reveal .btn{box-shadow:0 3px 10px rgba(0,0,0,.22);font-size:13px;padding:9px 18px}
.fixed-reveal .rev-info{font-size:10px;background:rgba(0,0,0,.55);color:#fff;border-radius:5px;padding:2px 8px;white-space:nowrap}

/* KOSAI FIXED */
.kf-section{padding:8px 14px;border-bottom:1px solid var(--border)}
.kf-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.kf-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;flex-wrap:wrap}
.kf-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap}
.kf-rieki{background:var(--green-lt);color:var(--green);border:1px solid #A5D6A7}
.kf-son{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md)}
.kf-doji{background:var(--gray-lt);color:var(--gray);border:1px solid var(--border)}
.kf-amount{font-size:13px;font-weight:700}
.kf-desc{font-size:10px;color:var(--sub);line-height:1.5}
.progress-bar{height:10px;background:#E8EDF2;border-radius:5px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:5px;transition:width .3s}
.jisa-row{display:flex;align-items:center;gap:6px;padding:2px 5px;font-size:10.5px;border-bottom:1px solid #F5F7FA}
.jisa-row:last-child{border-bottom:none}

/* SOSAI */
.sosai-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px}
.sosai-group{flex:1;min-width:160px;max-width:100%}
.sosai-group-title{font-size:12px;font-weight:700;color:var(--sub);background:#F5F7FA;padding:3px 8px;border-radius:5px;margin-bottom:4px;border-left:3px solid var(--blue);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sosai-group-title:hover{background:#EEF2F6}
.sosai-body{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:#fff}
.sosai-row{display:flex;align-items:center;gap:5px;padding:2px 5px;border-bottom:1px solid #F0F4F8;font-size:11.5px;flex-wrap:nowrap}
.sosai-row:last-child{border-bottom:none}
.sosai-row:hover{background:#FAFCFF}
.sosai-lbl{font-weight:700;color:var(--sub);min-width:30px;font-size:10px;flex-shrink:0}
.sosai-pos{display:flex;align-items:center;gap:2px;flex:1;flex-wrap:wrap;font-size:10px}
.sosai-res{font-size:11px;font-weight:700;text-align:right;min-width:72px;white-space:nowrap;flex-shrink:0}
.sosai-ok{color:var(--green)}
.sosai-ng{color:var(--red)}
.sosai-fix{font-size:9px;margin-left:2px;font-weight:400}
.sosai-achieved{font-size:9px;color:var(--green);background:var(--green-lt);border-radius:3px;padding:1px 3px;margin-left:2px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>/* ═══════════════════════ STATE ═══════════════════════ */
const S = {
  year:2025,month:1,stock:'',code:'',capital:'',shares:'',
  prices:{},revealed:0,
  // orders[dstr] = {buyId:number|null, sellId:number|null}
  orders:{},
  // settles[dstr] = [{id,posId,exitPrice,auto?}]
  settles:{},
  groups:mkGroups(),
  // carries[gi] = 移行時にスナップショットした未決済positionのIDリスト
  carries:Array.from({length:12},()=>[]),
  gi:0,idc:1,prOpen:false,
  sfDs:null,selPosArr:[],exitInp:'',
  fixedOpen:false,jisaOpen:false,
  rule3On:true,rule3Pct:3,
  prevP:'',memo:'',fukumi:'',

  // グループ別メモ
  groupMemos:Array.from({length:12},()=>''),
  // import
  impStat:null,
  pasteText:'',
  // 外部データ（予測精度向上用）
  extDow:{},   // NYダウ終値 {YYYY-MM-DD: 終値}
  extVol:{},   // 銘柄出来高 {YYYY-MM-DD: 出来高}
  dowPaste:'',volPaste:'',
  dowStat:null,volStat:null,
  // OHLCデータ {YYYY-MM-DD: {o,h,l,c}}
  extOHLC:{},ohlcPaste:'',ohlcStat:null,
  // 統合入力
  stockPaste:'',stockStat:null,
  // 翌日予測履歴 {YYYY-MM-DD: {dir:'up'|'down', chop:number}}
  predLog:{},
  // ATRパネル
  atrMult:1.5,
  atrBasePrice:'',
  atrOpen:false
};

function mkGroups(){return Array.from({length:12},()=>({buys:[],sells:[]}))}

/* ═══════════════════════ HELPERS ═══════════════════════ */
const NUMS=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫'];

function wds(y,m){
  const r=[],d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){if(d.getDay()&&d.getDay()!==6)r.push(new Date(d));d.setDate(d.getDate()+1)}
  return r;
}
function ds(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function fd(s){if(!s)return '';const[,m,d]=s.split('-');return `${+m}/${+d}`}
function fn(n){if(n===''||n==null)return '';const v=Number(n);return isNaN(v)?'':v.toLocaleString('ja-JP')}

/* 6ヶ月後の日付文字列 */
function addM6(dstr){const d=new Date(dstr);d.setMonth(d.getMonth()+6);return ds(d)}
/* 期限切れ判定 — YYYY-MM-DD文字列は辞書順で日付比較可能なのでDate生成不要 */
function isExp(entryDstr,checkDstr){return checkDstr>=addM6(entryDstr)}

/* ══ レンダーキャッシュ ══
 * R()の先頭でbuildCache()を呼び、1回のレンダーサイクル中に
 * entryById/openEgi/wds等の重複O(n)スキャンをO(1)に短縮する。
 * アクション関数（confirm/rm等）は直接S.groupsを参照するため影響なし。 */
let C={};

function buildCache(){
  // 平日カレンダー（18箇所で呼ばれていたwds()を1回に集約）
  C.days=wds(S.year,S.month);
  C.lastD=S.revealed>0?ds(C.days[S.revealed-1]):null;
  C.sh=Math.max(Number(S.shares)||1,1);
  C.curP=C.lastD?(S.prices[C.lastD]||null):null;
  // 公開済み日付セット（rTable/r3pctAlertのrevDstrs構築をキャッシュ）
  C.revDstrs=new Set(C.days.slice(0,S.revealed).map(d=>ds(d)));
  // O(1)エントリ検索マップ（12グループ全走査を排除）
  C.entryMap=new Map();
  for(const g of S.groups){
    for(const e of g.buys)C.entryMap.set(e.id,e);
    for(const e of g.sells)C.entryMap.set(e.id,e);
  }
  // 未決済ポジション一覧（openEgi()の重複呼び出しを排除）
  C.open=[];
  S.groups.forEach((g,gi)=>{
    for(const e of g.buys)if(!e.settled)C.open.push({...e,gi});
    for(const e of g.sells)if(!e.settled)C.open.push({...e,gi});
  });
  // 自動決済IDセット（rMemo内ループ用）
  C.autoStlIds=new Set();
  // 決済済みposId→exitPrice マップ（決済後の実現損益表示用）
  C.settleExitMap=new Map();
  C.settleGiMap=new Map(); // posId → 決済したグループ番号
  for(const ss of Object.values(S.settles)){
    for(const s of ss){
      if(s.auto)C.autoStlIds.add(s.posId);
      if(!C.settleExitMap.has(s.posId))C.settleExitMap.set(s.posId,s.exitPrice);
      if(!C.settleGiMap.has(s.posId))C.settleGiMap.set(s.posId,s.settledGi!=null?s.settledGi:-1);
    }
  }
  // 月間最高値・最安値をキャッシュ（H-●-Lバー用）
  C.monthHi=null;C.monthLo=null;
  C.revDstrs.forEach(function(d){
    var hi=S.extOHLC[d]?S.extOHLC[d].h:(S.prices[d]||null);
    var lo=S.extOHLC[d]?S.extOHLC[d].l:(S.prices[d]||null);
    if(hi&&(C.monthHi===null||hi>C.monthHi))C.monthHi=hi;
    if(lo&&(C.monthLo===null||lo<C.monthLo))C.monthLo=lo;
  });
}

/* キャッシュ対応エントリ検索 — レンダー中はO(1)、アクション中はO(n)フォールバック */
function entryById(id){
  if(C.entryMap)return C.entryMap.get(id)||null;
  for(const g of S.groups){
    for(const e of g.buys)if(e.id===id)return e;
    for(const e of g.sells)if(e.id===id)return e;
  }
  return null;
}
/* キャッシュ対応openEgi — レンダー中はC.openを再利用 */
function openEgi(){return C.open||S.groups.flatMap((g,gi)=>[...g.buys,...g.sells].filter(e=>!e.settled).map(e=>({...e,gi})))}

/* グループの表示エントリを取得（rMemo・rSosaiで重複定義していた処理を統合）
 * own（自グループ）+ carried（スナップショット済み引き継ぎ）を価格降順でマージ */
function calcGroupDisp(gi,type){
  const own=type==='buy'?S.groups[gi].buys:S.groups[gi].sells;
  const ownIds=new Set(own.map(e=>e.id));
  const carried=(S.carries[gi]||[])
    .map(id=>entryById(id))
    .filter(e=>e&&!ownIds.has(e.id)&&e.type===type);
  return [...carried,...own].sort((a,b)=>(b.price||0)-(a.price||0));
}

function dayProfit(dstr_){
  const ss=S.settles[dstr_]||[];if(!ss.length)return null;
  let t=0,any=false;
  for(const s of ss){
    const e=entryById(s.posId);if(!e||!e.price||!s.exitPrice)continue;
    t+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*C.sh;any=true;
  }
  return any?t:null;
}
/* C.daysキャッシュを利用（wds再呼び出しを排除） */
function monthProfit(){
  const days=C.days||wds(S.year,S.month);
  let t=0;
  for(const d of days){const p=dayProfit(ds(d));if(p)t+=p;}
  return t;
}

// CSVデータが読み込まれているか — for..inによりO(1)で判定
function hasAnyPrice(){for(const _ in S.prices)return true;return false;}

/* ═══════════════════════ 翌日予測エンジン v2 ═══════════════════════
 * ① スコアリング法  ② ナイーブベイズ法  ③ 酒田五法
 * の3手法を統合して方向と確信度(★1〜3)を算出
 ══════════════════════════════════════════════════════════════════════ */
function predictNextDay(){
  if(!S.revealed||!C.days)return null;
  var revDays=C.days.slice(0,S.revealed);
  var series=[],dates=[];
  for(var i=0;i<revDays.length;i++){var dstr=ds(revDays[i]);var p=S.prices[dstr];if(p){series.push(p);dates.push(dstr);}}
  // 前月補完（20日未満のとき）
  if(series.length<20){
    var need=25,prevSeries=[],prevDates=[];
    try{var py=S.month===1?S.year-1:S.year,pm=S.month===1?12:S.month-1;
      var raw=localStorage.getItem('katotre_'+py+'_'+(pm<10?'0':'')+pm);
      if(raw){var pmDays=wds(py,pm);for(var k=pmDays.length-1;k>=0&&prevSeries.length<need;k--){var pdstr=ds(pmDays[k]);var pp=S.prices[pdstr];if(pp){prevSeries.unshift(pp);prevDates.unshift(pdstr);}}}
    }catch(e){}
    series=prevSeries.concat(series);dates=prevDates.concat(dates);
  }
  if(series.length<6)return null;
  var n=series.length;

  // ── 共通サブ関数 ──────────────────────────────────────────
  function ma(arr,i,len){if(i<len-1)return null;var s=0;for(var k=i-len+1;k<=i;k++)s+=arr[k];return s/len;}
  function ma5(arr,i){return ma(arr,i,5);}
  var hasDow=Object.keys(S.extDow).length>0,dowKeys=hasDow?Object.keys(S.extDow).sort():[];
  function latestDow(d){if(!hasDow)return null;var f=null;for(var k=0;k<dowKeys.length;k++){if(dowKeys[k]<d)f=dowKeys[k];else break;}return f?S.extDow[f]:null;}
  function prevDow(d){if(!hasDow)return null;var c=0;for(var k=dowKeys.length-1;k>=0;k--){if(dowKeys[k]<d){c++;if(c===2)return S.extDow[dowKeys[k]];}}return null;}
  function dowDir(idx){if(!hasDow||idx<1)return null;var ref;if(idx<n-1&&dates[idx+1])ref=dates[idx+1];else{var t=new Date(dates[idx]);t.setDate(t.getDate()+3);ref=ds(t);}var d0=latestDow(ref),d1=prevDow(ref);if(!d0||!d1)return null;return d0>=d1?1:0;}
  var hasVol=Object.keys(S.extVol).length>0;
  function volRank(idx){if(!hasVol)return null;var vs=[];for(var k=Math.max(0,idx-19);k<idx;k++){var v=S.extVol[dates[k]];if(v)vs.push(v);}if(vs.length<5)return null;var avg=vs.reduce(function(s,v){return s+v;},0)/vs.length,cur=S.extVol[dates[idx]];if(!cur)return null;return cur/avg>=1.5?1:cur/avg<=0.7?-1:0;}
  function rsi14(idx){if(idx<14)return null;var g=0,l=0;for(var k=idx-13;k<=idx;k++){var d=series[k]-series[k-1];if(d>0)g+=d;else l+=(-d);}if(g===0&&l===0)return 50;var rs=l===0?100:(g/14)/(l/14);return l===0?100:100-(100/(1+rs));}
  function bb20(idx){if(idx<19)return null;var vals=[];for(var k=idx-19;k<=idx;k++)vals.push(series[k]);var avg=vals.reduce(function(s,v){return s+v;},0)/20,variance=vals.reduce(function(s,v){return s+(v-avg)*(v-avg);},0)/20,sd=Math.sqrt(variance);if(sd===0)return{pos:50,upper:avg,lower:avg,mid:avg};var pos=Math.min(100,Math.max(0,Math.round((series[idx]-(avg-2*sd))/(4*sd)*100)));return{pos,upper:avg+2*sd,lower:avg-2*sd,mid:avg};}
  // MACD(12,26,9)
  function macdLine(idx){var m12=ma(series,idx,12),m26=ma(series,idx,26);if(!m12||!m26)return null;return m12-m26;}
  function macdSignal(idx){if(idx<34)return null;var ms=[];for(var k=idx-8;k<=idx;k++){var ml=macdLine(k);if(ml===null)return null;ms.push(ml);}return ms.reduce(function(s,v){return s+v;},0)/9;}
  // Stochastic(14,3)
  function stoch(idx){if(idx<13)return null;var hs=[],ls=[];for(var k=idx-13;k<=idx;k++){hs.push(series[k]);ls.push(series[k]);}var H=Math.max.apply(null,hs),L=Math.min.apply(null,ls);if(H===L)return 50;return Math.round((series[idx]-L)/(H-L)*100);}
  // レンジ検知
  function chopScore(idx,w){if(idx<w)return 0;var alt=0;for(var k=idx-w+1;k<=idx;k++){var d0=series[k]-series[k-1],d1=series[k-1]-series[k-2];if(d0*d1<0)alt++;}return alt/(w-1);}
  var chop5=n>5?chopScore(n-1,5):0,chop10=n>10?chopScore(n-1,10):0;
  var chopLevel=Math.round((chop5*0.6+chop10*0.4)*100),isRange=chopLevel>=70;

  // ══════════════════════════════════════════
  // ① スコアリング法
  // ══════════════════════════════════════════
  var score=0;var scoreItems=[];
  var rsiVal=rsi14(n-1);
  if(rsiVal!==null){
    if(rsiVal<=30){score+=2;scoreItems.push({name:'RSI売られすぎ',val:+2});}
    else if(rsiVal<=40){score+=1;scoreItems.push({name:'RSI低め',val:+1});}
    else if(rsiVal>=70){score-=2;scoreItems.push({name:'RSI買われすぎ',val:-2});}
    else if(rsiVal>=60){score-=1;scoreItems.push({name:'RSI高め',val:-1});}
  }
  var bbVal=bb20(n-1);
  if(bbVal){
    if(bbVal.pos<=10){score+=2;scoreItems.push({name:'BB下限',val:+2});}
    else if(bbVal.pos<=30){score+=1;scoreItems.push({name:'BBやや下',val:+1});}
    else if(bbVal.pos>=90){score-=2;scoreItems.push({name:'BB上限',val:-2});}
    else if(bbVal.pos>=70){score-=1;scoreItems.push({name:'BBやや上',val:-1});}
  }
  var m5v=ma5(series,n-1);
  if(m5v){if(series[n-1]>m5v){score+=1;scoreItems.push({name:'MA5上',val:+1});}else{score-=1;scoreItems.push({name:'MA5下',val:-1});}}
  var ml=macdLine(n-1),ms=macdSignal(n-1);
  if(ml!==null&&ms!==null){if(ml>ms){score+=1;scoreItems.push({name:'MACD上',val:+1});}else{score-=1;scoreItems.push({name:'MACD下',val:-1});}}
  var stv=stoch(n-1);
  if(stv!==null){if(stv<=20){score+=1;scoreItems.push({name:'Stoch低',val:+1});}else if(stv>=80){score-=1;scoreItems.push({name:'Stoch高',val:-1});}}
  var dd=dowDir(n-1);
  if(dd!==null){if(dd===1){score+=1;scoreItems.push({name:'NY上昇',val:+1});}else{score-=1;scoreItems.push({name:'NY下落',val:-1});}}
  var vr=volRank(n-1);
  if(vr!==null&&vr!==0){if(vr===1){score+=1;scoreItems.push({name:'出来高大',val:+1});}else{score-=1;scoreItems.push({name:'出来高小',val:-1});}}

  // ④ 月間H-Lポジション（±1のみ・補助シグナル）
  var hlPos=null;
  if(C.monthHi&&C.monthLo&&C.monthHi>C.monthLo){
    hlPos=Math.round((series[n-1]-C.monthLo)/(C.monthHi-C.monthLo)*100);
    if(hlPos<=15){score+=1;scoreItems.push({name:'月間安値圏',val:+1});}
    else if(hlPos>=85){score-=1;scoreItems.push({name:'月間高値圏',val:-1});}
  }

  // ⑤ 連騰/連落（4日以上同方向→反転バイアス、3日以下は無視）
  if(n>=5){
    var streak=0,streakDir=0;
    for(var k=n-1;k>=1;k--){
      var d_=series[k]-series[k-1];
      if(k===n-1){streakDir=d_>=0?1:-1;streak=1;}
      else if((d_>=0&&streakDir===1)||(d_<0&&streakDir===-1)){streak++;}
      else break;
    }
    if(streak>=5){var rev=-streakDir*2;score+=rev;scoreItems.push({name:'5連'+(streakDir>0?'騰':'落')+'反転',val:rev});}
    else if(streak>=4){var rev2=-streakDir*1;score+=rev2;scoreItems.push({name:'4連'+(streakDir>0?'騰':'落')+'反転',val:rev2});}
  }

  // ⑥ 前日大幅変動後の反転（ATRの2倍以上に強化）
  if(n>=2){
    var prevChg=Math.abs(series[n-1]-series[n-2]);
    var atrEst_=calcATR(14)||prevChg;
    if(atrEst_>0&&prevChg>=atrEst_*2.0){
      var bigDir=series[n-1]>=series[n-2]?-1:1;
      score+=bigDir*1;
      scoreItems.push({name:'急騰急落反転',val:bigDir*1});
    }
  }

  // レンジ相場は方向反転
  var scoreAdj=isRange?-score:score;
  var scoreDir=scoreAdj>=0?'up':'down';

  // ══════════════════════════════════════════
  // ② ナイーブベイズ法
  // 過去データで各指標のP(up|indicator)を計算
  // ══════════════════════════════════════════
  var bayesLogOdds=0;var bayesCount=0;
  var totalUp=0,totalDn=0;
  for(var j=5;j<n-1;j++){if(series[j+1]>=series[j])totalUp++;else totalDn++;}
  var totalHist=totalUp+totalDn;
  if(totalHist>=10){
    var priorOdds=totalUp/Math.max(1,totalDn);
    bayesLogOdds=Math.log(priorOdds);
    // RSIゾーン別の的中率
    function bayesFactor(filterFn){var fu=0,fd2=0;for(var j=5;j<n-1;j++){if(!filterFn(j))continue;if(series[j+1]>=series[j])fu++;else fd2++;}var t=fu+fd2;if(t<3)return 0;return Math.log((fu+0.5)/(fd2+0.5))-(Math.log((totalUp+0.5)/(totalDn+0.5)));}
    if(rsiVal!==null)bayesLogOdds+=bayesFactor(function(j){var r=rsi14(j);return r!==null&&Math.abs(r-rsiVal)<15;});
    if(bbVal)bayesLogOdds+=bayesFactor(function(j){var b=bb20(j);return b&&Math.abs(b.pos-bbVal.pos)<20;});
    if(dd!==null)bayesLogOdds+=bayesFactor(function(j){return dowDir(j)===dd;});
    bayesCount=totalHist;
  }
  var bayesProb=totalHist>=10?Math.round(100/(1+Math.exp(-bayesLogOdds))):50;
  var bayesDir=bayesProb>=50?'up':'down';

  // ══════════════════════════════════════════
  // ③ 酒田五法
  // ══════════════════════════════════════════
  var sakata=null;
  function getOHLC(idx){
    var d=dates[idx];
    if(S.extOHLC&&S.extOHLC[d])return S.extOHLC[d];
    // OHLCなし → 終値のみで近似
    var c=series[idx],prev=idx>0?series[idx-1]:c;
    return{o:prev,h:Math.max(prev,c),l:Math.min(prev,c),c:c};
  }
  if(n>=3){
    var c0=getOHLC(n-1),c1=getOHLC(n-2),c2=getOHLC(n-3);
    var isBull0=c0.c>=c0.o,isBull1=c1.c>=c1.o,isBull2=c2.c>=c2.o;
    var body0=Math.abs(c0.c-c0.o),body1=Math.abs(c1.c-c1.o),body2=Math.abs(c2.c-c2.o);
    var range0=c0.h-c0.l;
    // 三本陽線（三兵）: 3日連続陽線で高値更新
    if(isBull0&&isBull1&&isBull2&&c0.c>c1.c&&c1.c>c2.c&&body0>0&&body1>0&&body2>0)
      sakata={name:'三本陽線',dir:'up',score:2,emoji:'📈'};
    // 三本陰線（三羽烏）
    else if(!isBull0&&!isBull1&&!isBull2&&c0.c<c1.c&&c1.c<c2.c&&body0>0&&body1>0&&body2>0)
      sakata={name:'三本陰線',dir:'down',score:-2,emoji:'📉'};
    // 包み足（陽の包み足）: 前日陰線を今日の陽線が包む
    else if(isBull0&&!isBull1&&c0.o<=c1.c&&c0.c>=c1.o&&body0>body1)
      sakata={name:'陽の包み足',dir:'up',score:2,emoji:'🔼'};
    // 包み足（陰の包み足）
    else if(!isBull0&&isBull1&&c0.o>=c1.c&&c0.c<=c1.o&&body0>body1)
      sakata={name:'陰の包み足',dir:'down',score:-2,emoji:'🔽'};
    // はらみ足（陽のはらみ）: 前日大陽線の中に今日が収まる
    else if(body1>body0*2&&c0.h<=c1.h&&c0.l>=c1.l&&isBull1)
      sakata={name:'陽のはらみ',dir:'up',score:1,emoji:'⚡'};
    // はらみ足（陰のはらみ）
    else if(body1>body0*2&&c0.h<=c1.h&&c0.l>=c1.l&&!isBull1)
      sakata={name:'陰のはらみ',dir:'down',score:-1,emoji:'⚡'};
    // 明けの明星: 陰線→小実体→大陽線
    else if(n>=3&&isBull0&&!isBull2&&body2>0&&body0>body1&&c0.c>c2.c)
      sakata={name:'明けの明星',dir:'up',score:3,emoji:'🌟'};
    // 宵の明星
    else if(n>=3&&!isBull0&&isBull2&&body2>0&&body0>body1&&c0.c<c2.c)
      sakata={name:'宵の明星',dir:'down',score:-3,emoji:'🌙'};
    // たすき足（上昇たすき）: 陽→陰→陽でギャップ
    else if(isBull0&&!isBull1&&isBull2&&c0.o>c1.c&&c2.o<c1.o)
      sakata={name:'上昇たすき',dir:'up',score:1,emoji:'↗'};
    // 上影陰線（トウバ系）: 上ヒゲが実体の2倍以上
    else if(range0>0&&(c0.h-Math.max(c0.o,c0.c))>=body0*2&&body0/range0<0.3)
      sakata={name:'上影線',dir:'down',score:-1,emoji:'⬇'};
    // 下影陽線（カラカサ・トンボ系）
    else if(range0>0&&(Math.min(c0.o,c0.c)-c0.l)>=body0*2&&body0/range0<0.3)
      sakata={name:'下影線',dir:'up',score:1,emoji:'⬆'};
    // 十字線（同値）
    else if(body0/Math.max(range0,0.001)<0.05)
      sakata={name:'十字線',dir:null,score:0,emoji:'✚'};
  }
  var sakataDir=sakata&&sakata.dir?sakata.dir:null;

  // ══════════════════════════════════════════
  // 統合判定
  // ══════════════════════════════════════════
  var votes={up:0,down:0};
  // スコアリング：±1〜3票
  var scorePower=Math.min(3,Math.ceil(Math.abs(scoreAdj)/2));
  if(scoreDir==='up')votes.up+=scorePower;else votes.down+=scorePower;
  // ベイズ：確率差に応じた票数
  var bayesPower=Math.abs(bayesProb-50)>=20?2:1;
  if(bayesDir==='up')votes.up+=bayesPower;else votes.down+=bayesPower;
  // 酒田：パターンのスコアに応じた票数
  if(sakata&&sakata.dir){var sakPower=Math.min(2,Math.abs(sakata.score));if(sakata.dir==='up')votes.up+=sakPower;else votes.down+=sakPower;}

  var totalVotes=votes.up+votes.down;
  var finalDir=votes.up>=votes.down?'up':'down';
  var winVotes=Math.max(votes.up,votes.down);
  // ★確信度: 3/3一致→★★★, 2/3→★★, 1/3→★
  var stars=winVotes/totalVotes>=0.75?3:winVotes/totalVotes>=0.55?2:1;
  // データ不足時は★★止まり
  if(totalHist<10&&stars===3)stars=2;

  // ══════════════════════════════════════════
  // 最終確率計算（3手法ブレンド）
  // votes比率(50%) + ベイズ確率(50%) を合成 → isRange反映済み
  // ══════════════════════════════════════════
  var voteUpPct=Math.round(votes.up/totalVotes*100);
  var upProb=Math.round(voteUpPct*0.5+bayesProb*0.5);
  // 酒田五法のスコアで微調整(±5%まで)
  if(sakata&&sakata.score){
    var sakAdj=Math.round(sakata.score/3*5);
    upProb=upProb+(sakata.dir==='up'?sakAdj:-sakAdj);
  }
  upProb=Math.max(10,Math.min(90,upProb));

  return{
    dir:finalDir,
    stars:stars,
    score:scoreAdj,
    bayesProb:bayesProb,
    sakata:sakata,
    chop:chopLevel,
    isRange:isRange,
    votes:votes,
    upProb:upProb,
    rsi:rsiVal?Math.round(rsiVal):null,
    bbPos:bbVal?bbVal.pos:null
  };
}

function checkAutoSettle(revDstr){
  const ep=S.prices[revDstr];
  if(!ep)return;
  // 全グループをフラットに走査（openEgi()キャッシュ未構築時のため直接走査）
  S.groups.forEach((g,gIdx)=>{
    for(const arr of[g.buys,g.sells]){
      for(const e of arr){
        if(e.settled||!isExp(e.date,revDstr))continue;
        if(!S.settles[revDstr])S.settles[revDstr]=[];
        if(S.settles[revDstr].some(x=>x.posId===e.id))continue;
        S.settles[revDstr].push({id:S.idc++,posId:e.id,exitPrice:ep,auto:true,settledGi:gIdx});
        e.settled=true;
      }
    }
  });
}

/* 現在公開中の最終日における期限切れ・期限接近ポジション */
function warnPositions(){
  if(!S.revealed||!C.days)return[];
  const lastD=C.lastD||ds(C.days[S.revealed-1]);
  // 30日後の日付文字列（文字列比較でDate生成を回避）
  const warnD=new Date(lastD);warnD.setDate(warnD.getDate()+30);
  const warnStr=ds(warnD);
  return C.open.filter(e=>addM6(e.date)<=warnStr);
}

/* グループ移行時に未決済ポジションIDをcarries[toGi]にスナップショット */
function snapshotCarries(fromGi, toGi){
  if(toGi>=12)return;
  // fromGi に表示されている全ID (own + 既にcarriedされたもの) を収集
  const ownIds=[...S.groups[fromGi].buys,...S.groups[fromGi].sells].map(e=>e.id);
  const carriedIds=S.carries[fromGi]||[];
  const allIds=[...new Set([...carriedIds,...ownIds])];
  // 未決済のみ次グループへ
  const unsettled=allIds.filter(id=>{const e=entryById(id);return e&&!e.settled;});
  const existing=new Set(S.carries[toGi]);
  for(const id of unsettled)existing.add(id);
  S.carries[toGi]=[...existing];
}

/* ═══════════════════════ ACTIONS ═══════════════════════ */
function toggleOrder(dstr,type){
  if(!S.orders[dstr])S.orders[dstr]={buyId:null,sellId:null};
  const ord=S.orders[dstr];
  const key=type==='buy'?'buyId':'sellId';
  if(ord[key]!==null){
    rmFromGroups(ord[key]);ord[key]=null;
  } else {
    const price=S.prices[dstr]||null;
    const id=S.idc++;
    ord[key]=id;
    const g=S.groups[S.gi];
    const e={id,date:dstr,price,type,settled:false};
    if(type==='buy'){g.buys.push(e);g.buys.sort((a,b)=>(b.price||0)-(a.price||0));}
    else {g.sells.push(e);g.sells.sort((a,b)=>(b.price||0)-(a.price||0));}
  }
  R();
}

function rmFromGroups(id){
  S.groups.forEach(g=>{g.buys=g.buys.filter(e=>e.id!==id);g.sells=g.sells.filter(e=>e.id!==id)});

/* ─── 日付パース共通関数 ─── */
function parseDateStr(raw){
  if(!raw)return null;
  raw=String(raw).trim();
  if(/^\d{8}$/.test(raw))return raw.slice(0,4)+'-'+raw.slice(4,6)+'-'+raw.slice(6,8);
  var m=raw.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
  if(m)return m[1]+'-'+(m[2].length<2?'0':'')+m[2]+'-'+(m[3].length<2?'0':'')+m[3];
  return null;
}

/* ─── 銘柄データ一括取り込み（始値・高値・安値・終値・出来高）─── */
function applyStockData(){
  var text=S.stockPaste;
  if(!text.trim()){S.stockStat={type:'err',msg:'データを貼り付けてください'};R();return;}
  var lines=text.split(/\r?\n/).map(function(l){return l.trim();}).filter(function(l){return l;});
  var cnt=0;
  for(var i=0;i<lines.length;i++){
    var cols=lines[i].split('\t').map(function(c){return c.trim().replace(/,/g,'');});
    if(cols.length<2)continue;
    var dstr=parseDateStr(cols[0]);
    if(!dstr)continue;
    // 数値を全部収集
    var nums=[];
    for(var ci=1;ci<cols.length;ci++){
      var v=parseFloat(cols[ci]);
      if(!isNaN(v)&&v>=0)nums.push(v);
    }
    if(nums.length===0)continue;
    // 終値のみの場合（1列）
    if(nums.length===1){
      S.prices[dstr]=nums[0];
      cnt++;continue;
    }
    // 終値+出来高（2列）
    if(nums.length===2){
      S.prices[dstr]=nums[0];
      S.extVol[dstr]=nums[1];
      cnt++;continue;
    }
    // OHLC（4列）またはOHLC+出来高（5列以上）
    if(nums.length>=4){
      var o=nums[0],h=nums[1],l=nums[2],c2=nums[3];
      var hi=Math.max(o,h,l,c2),lo=Math.min(o,h,l,c2);
      S.extOHLC[dstr]={o:o,h:hi,l:lo,c:c2};
      S.prices[dstr]=c2;
      if(nums.length>=5&&nums[4]>0)S.extVol[dstr]=nums[4];
      cnt++;continue;
    }
    // 3列の場合は終値を3列目とする
    S.prices[dstr]=nums[nums.length-1];
    cnt++;
  }
  S.stockStat=cnt>0
    ?{type:'ok',msg:'銘柄データ '+cnt+'日分 取り込み完了（終値・OHLC・出来高を自動振り分け）'}
    :{type:'err',msg:'データを解析できませんでした'};
  lsSaveExt();R();
}

/* ─── ローソク足パターン判定（11種類）─── */
function candlePattern(dstr){
  var ohlc=S.extOHLC[dstr];
  if(!ohlc)return null;
  var o=ohlc.o,h=ohlc.h,l=ohlc.l,c=ohlc.c;
  var range=h-l;
  if(range===0)return 'IP';
  var body=Math.abs(c-o);
  var bodyR=body/range;
  var upShadow=h-Math.max(o,c);
  var dnShadow=Math.min(o,c)-l;
  var upR=upShadow/range;
  var dnR=dnShadow/range;
  var isBull=c>=o;

  if(bodyR<=0.05&&dnR>=0.6&&upR<=0.1)return 'TO';
  if(bodyR<=0.05&&upR>=0.6&&dnR<=0.1)return 'TB';
  if(bodyR<=0.05)return 'JU';
  if(dnR>=0.5&&bodyR<=0.2&&upR<=0.1)return 'KA';
  if(bodyR<=0.2&&upR>=0.1&&dnR>=0.1)return 'KO';
  if(upR<=0.05&&dnR<=0.05)return 'IP';
  if(isBull&&bodyR>=0.6)return 'BY';
  if(!isBull&&bodyR>=0.6)return 'BN';
  if(isBull&&dnR>=bodyR*2)return 'DY';
  if(!isBull&&upR>=bodyR*2)return 'UN';
  if(isBull&&upR>=bodyR*2)return 'UY';
  if(!isBull&&dnR>=bodyR*2)return 'DN';
  if(isBull)return 'SY';
  return 'SN';
}

function candleScore(pattern){
  var scores={'BY':3,'SY':1,'DY':2,'UY':-1,'BN':-3,'SN':-1,'DN':1,'UN':-2,'KA':2,'TO':2,'TB':-2,'JU':0,'KO':0,'IP':0};
  return scores[pattern]||0;
}

function candleName(pattern){
  var names={'BY':'大陽線','SY':'小陽線','DY':'下ヒゲ陽線','UY':'上ヒゲ陽線','BN':'大陰線','SN':'小陰線','DN':'下ヒゲ陰線','UN':'上ヒゲ陰線','KA':'カラカサ','TO':'トンボ','TB':'トウバ','JU':'十字線','KO':'コマ','IP':'一本線'};
  return names[pattern]||'';
}

function detectChartPattern(series){
  var n=series.length;
  if(n<15)return null;
  var r=series.slice(Math.max(0,n-30));
  var len=r.length;
  var peaks=[],troughs=[];
  for(var i=1;i<len-1;i++){
    if(r[i]>=r[i-1]&&r[i]>=r[i+1])peaks.push({i:i,v:r[i]});
    if(r[i]<=r[i-1]&&r[i]<=r[i+1])troughs.push({i:i,v:r[i]});
  }
  var cur=r[len-1];

  if(troughs.length>=2){
    var t1=troughs[troughs.length-2],t2=troughs[troughs.length-1];
    if(Math.abs(t1.v-t2.v)/Math.max(t1.v,t2.v)<0.04&&t2.i>t1.i+3){
      var neck=0;
      for(var pi=0;pi<peaks.length;pi++)if(peaks[pi].i>t1.i&&peaks[pi].i<t2.i)neck=Math.max(neck,peaks[pi].v);
      if(neck>0&&cur>=neck*0.99)return{label:'📈ダブルボトム',cl:'var(--blue)',bg:'var(--blue-lt)'};
    }
  }
  if(peaks.length>=2){
    var p1=peaks[peaks.length-2],p2=peaks[peaks.length-1];
    if(Math.abs(p1.v-p2.v)/Math.max(p1.v,p2.v)<0.04&&p2.i>p1.i+3){
      var neck=Infinity;
      for(var ti=0;ti<troughs.length;ti++)if(troughs[ti].i>p1.i&&troughs[ti].i<p2.i)neck=Math.min(neck,troughs[ti].v);
      if(neck<Infinity&&cur<=neck*1.01)return{label:'📉ダブルトップ',cl:'var(--red)',bg:'var(--red-lt)'};
    }
  }
  if(troughs.length>=3){
    var ta=troughs[troughs.length-3],tb2=troughs[troughs.length-2],tc=troughs[troughs.length-1];
    if(tb2.v<ta.v&&tb2.v<tc.v&&Math.abs(ta.v-tc.v)/Math.max(ta.v,tc.v)<0.05){
      var inv1=0,inv2=0;
      for(var pi=0;pi<peaks.length;pi++){
        if(peaks[pi].i>ta.i&&peaks[pi].i<tb2.i)inv1=Math.max(inv1,peaks[pi].v);
        if(peaks[pi].i>tb2.i&&peaks[pi].i<tc.i)inv2=Math.max(inv2,peaks[pi].v);
      }
      if(inv1>0&&inv2>0&&cur>=(inv1+inv2)/2*0.99)return{label:'📈逆三尊',cl:'var(--blue)',bg:'var(--blue-lt)'};
    }
  }
  if(peaks.length>=3){
    var pa=peaks[peaks.length-3],pb=peaks[peaks.length-2],pc=peaks[peaks.length-1];
    if(pb.v>pa.v&&pb.v>pc.v&&Math.abs(pa.v-pc.v)/Math.max(pa.v,pc.v)<0.05){
      var hs1=Infinity,hs2=Infinity;
      for(var ti=0;ti<troughs.length;ti++){
        if(troughs[ti].i>pa.i&&troughs[ti].i<pb.i)hs1=Math.min(hs1,troughs[ti].v);
        if(troughs[ti].i>pb.i&&troughs[ti].i<pc.i)hs2=Math.min(hs2,troughs[ti].v);
      }
      if(hs1<Infinity&&hs2<Infinity&&cur<=(hs1+hs2)/2*1.01)return{label:'📉三尊',cl:'var(--red)',bg:'var(--red-lt)'};
    }
  }
  if(len>=15){
    var flBase1=r[len-15],flPeak=Math.max.apply(null,r.slice(len-12,len-4));
    if((flPeak-flBase1)/flBase1>0.04){
      var flCs1=r.slice(len-4);
      var flHi1=Math.max.apply(null,flCs1),flLo1=Math.min.apply(null,flCs1);
      if((flHi1-flLo1)/flPeak<0.025&&flCs1[3]>flLo1)return{label:'📈上昇フラッグ',cl:'#2E7D32',bg:'var(--green-lt)'};
    }
  }
  if(len>=15){
    var flBase2=r[len-15],flLow=Math.min.apply(null,r.slice(len-12,len-4));
    if((flBase2-flLow)/flBase2>0.04){
      var flCs2=r.slice(len-4);
      var flHi2=Math.max.apply(null,flCs2),flLo2=Math.min.apply(null,flCs2);
      if((flHi2-flLo2)/flBase2<0.025&&flCs2[3]<flHi2)return{label:'📉下降フラッグ',cl:'var(--red)',bg:'var(--red-lt)'};
    }
  }
  return null;
}

/* ─── ATR計算（extOHLCがあれば正確、なければ終値で近似）─── */
function calcATR(period){
  period=period||14;
  const revDstrs=[...C.revDstrs].sort();
  if(revDstrs.length<2)return null;
  const trs=[];
  for(let i=1;i<revDstrs.length;i++){
    const d=revDstrs[i];
    const prev=revDstrs[i-1];
    const ohlc=S.extOHLC[d];
    const h=ohlc?ohlc.h:S.prices[d];
    const l=ohlc?ohlc.l:S.prices[d];
    const c=S.prices[d];
    const pc=S.prices[prev];
    if(!h||!l||!c||!pc)continue;
    const tr=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    trs.push(tr);
  }
  if(!trs.length)return null;
  const recent=trs.slice(-period);
  return Math.round(recent.reduce((s,v)=>s+v,0)/recent.length);
}

function getPrevUnsettled(y,m){

      (g.buys||[]).forEach(e=>{if(!e.settled&&!settledIds.has(e.id))entries.push({...e,type:'buy'});});
      (g.sells||[]).forEach(e=>{if(!e.settled&&!settledIds.has(e.id))entries.push({...e,type:'sell'});});

function calcPrevMonthProfit(y,m){
  try{
    const raw=localStorage.getItem(prevMonthKey(y,m));
    if(!raw)return 0;
    const d=JSON.parse(raw);
    const groups=d.groups||[];
    const settles=d.settles||{};
    const sh=Math.max(Number(S.shares)||1,1);
    const allEntries={};
    groups.forEach(g=>{
      (g.buys||[]).forEach(e=>{allEntries[e.id]=e;});
      (g.sells||[]).forEach(e=>{allEntries[e.id]=e;});
    });
    let total=0;
    Object.values(settles).forEach(ss=>ss.forEach(s=>{
      const e=allEntries[s.posId];
      if(!e||!e.price||!s.exitPrice)return;
      total+=(e.type==='buy'?s.exitPrice-e.price:e.price-s.exitPrice)*sh;
    }));
    return Math.round(total);
  }catch(e){return 0;}
}

function applyCarryOver(y,m){
  const entries=getPrevUnsettled(y,m);
  if(!entries.length)return false;
  entries.forEach(e=>{
    const newId=S.idc++;
    const newEntry={id:newId,date:e.date,price:e.price,type:e.type,settled:false};
    if(e.type==='buy'){
      S.groups[0].buys.push(newEntry);
      S.groups[0].buys.sort((a,b)=>(b.price||0)-(a.price||0));
    } else {
      S.groups[0].sells.push(newEntry);
      S.groups[0].sells.sort((a,b)=>(b.price||0)-(a.price||0));
    }
  });
  return true;
}

/* ─── 最高値・最安値 ─── */
/* ─── ATR計算（extOHLCを優先、なければ終値で近似）─── */
function calcATR(period){
  period=period||14;
  const revDstrs=[...C.revDstrs].sort();
  if(revDstrs.length<2)return null;
  const trs=[];
  for(var i=1;i<revDstrs.length;i++){
    var d=revDstrs[i],prev=revDstrs[i-1];
    var h=S.extOHLC[d]?S.extOHLC[d].h:S.prices[d];
    var l=S.extOHLC[d]?S.extOHLC[d].l:S.prices[d];
    var c=S.prices[d],pc=S.prices[prev];
    if(!h||!l||!c||!pc)continue;
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  if(!trs.length)return null;
  var recent=trs.slice(-period);
  return Math.round(recent.reduce(function(s,v){return s+v;},0)/recent.length);
}

function rHighLow(days){
  const revDstrs=C.revDstrs||new Set(days.slice(0,S.revealed).map(d=>ds(d)));
  const mPrices=[];
  revDstrs.forEach(dstr=>{

  let allHi=null,allLo=null;
  try{
    const revealedDstrs=new Set();
    revDstrs.forEach(d=>revealedDstrs.add(d));
    lsSavedList().forEach(x=>{
      if(x.y===S.year&&x.m===S.month)return;
      try{
        const raw=localStorage.getItem(lsKey(x.y,x.m));
        if(!raw)return;
        const md=JSON.parse(raw);

          revealedDstrs.add(dstr);

    revealedDstrs.forEach(dstr=>{
      if(S.prices[dstr])allPrices.push({dstr,price:S.prices[dstr]});

  const showAll=allHi&&allLo&&(allHi.price!==mHi.price||allLo.price!==mLo.price);

/* ─── ルール判定 ─── */
function calcThreshold(basePrice, pct){
  const mag=Math.pow(10,Math.floor(Math.log10(basePrice)));
  const leadDigit=Math.floor(basePrice/mag);
  return Math.round(leadDigit*mag*(pct/100));
}

function checkRulePct(dstr, type){
  if(!S.rule3On)return null;
  const same=(C.open||openEgi()).filter(e=>e.type===type&&e.price);
  if(!same.length)return null;
  const curP=S.prices[dstr]||null;
  if(!curP)return null;
  const pct=S.rule3Pct||3;
  let ngBase=null,ngDiff=null,ngNeed=null;
  for(const e of same){
    const base=e.price;
    const threshold=calcThreshold(base,pct);
    const diff=Math.abs(curP-base);
    if(diff<threshold){
      if(ngBase===null||diff<ngDiff){
        ngBase=base;ngDiff=Math.round(diff);ngNeed=threshold;
      }
    }
  }
  if(ngBase!==null){
    return {ok:false,base:ngBase,curP,diff:ngDiff,need:ngNeed,pct,type};
  }
  const closest=same.reduce((a,b)=>Math.abs((b.price||0)-curP)<Math.abs((a.price||0)-curP)?b:a);
  const base=closest.price;
  const diff=Math.round(Math.abs(curP-base));
  const need=calcThreshold(base,pct);
  return {ok:true,base,curP,diff,need,pct,type};
}

function r3pctAlert(dstr, type){
  if(!(C.revDstrs||new Set()).has(dstr))return '';
  const r=checkRulePct(dstr,type);
  if(!r)return '';
  if(r.ok){
    return `<div style="font-size:8px;color:#0057B8;font-weight:700;line-height:1.2">+${fn(r.diff)}円</div>`;
  }
  const remaining=r.need-r.diff;
  return `<div style="font-size:8px;color:#C62828;font-weight:700;line-height:1.2">-${fn(remaining)}円</div>`;
}

    const rows=[];
    let bi2=0,si2=0;
    while(rows.length<5&&(bi2<dispB.length||si2<dispS.length)){
      const bp=bi2<dispB.length?(dispB[bi2].price||0):null;

      }
      return `<div class="kf-row">
        <span class="kf-badge ${typeCls}">${typeLabel}</span>
        <span class="tb">○${fn(p.buy.price)}</span>
        <span style="color:var(--muted)">×</span>
        <span class="ts">×${fn(p.sell.price)}</span>
        <span class="kf-amount ${amtCl}" style="min-width:70px">${p.diff>=0?'+':''}${fn(amtVal)}円</span>
        <span class="kf-desc">${desc}</span>
      </div>`;
    }).join('');
    const summary=`
      ${riekiTotal>0?`<span class="kf-badge kf-rieki">利益固定計 +${fn(riekiTotal)}円</span>`:''}
      ${sonTotal<0?`<span class="kf-badge kf-son">損失固定計 ${fn(sonTotal)}円</span>`:''}`;
    return `<div class="kf-section">
      <div class="kf-title" style="cursor:pointer;user-select:none" onclick="S.fixedOpen=!S.fixedOpen;R()">
        🔒 固定判定 ${summary}
        <span style="margin-left:auto;font-size:10px;background:#EEF2F6;padding:1px 8px;border-radius:4px;color:var(--sub)">${S.fixedOpen?'▲ 閉じる':'▼ 詳細表示'}</span>
      </div>
      ${S.fixedOpen?`<div>${rows}</div>`:''}
    </div>`;
  }

  function rJisaSection(){
    if(sonTotal>=0)return '';
    const deficit=Math.abs(sonTotal);
    const recovered=Math.max(0,settledProfit);
    const remaining=Math.max(0,deficit-recovered);
    const pct=Math.min(100,Math.round(recovered/deficit*100));
    const done=remaining<=0;
    const statusBadge=done?'<span class="kf-badge kf-rieki">✓ 相殺完了</span>'
      :`<span class="kf-badge kf-son">残り-${fn(Math.round(remaining))}円</span>`;
    return `<div class="kf-section">
      <div class="kf-title" style="cursor:pointer;user-select:none" onclick="S.jisaOpen=!S.jisaOpen;R()">
        ⏱ 時間差相殺トラッカー ${statusBadge}
        <span style="margin-left:auto;font-size:10px;background:#EEF2F6;padding:1px 8px;border-radius:4px;color:var(--sub)">${S.jisaOpen?'▲ 閉じる':'▼ 詳細表示'}</span>
      </div>
      ${S.jisaOpen?`
      <div>
        <div style="font-size:11px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px">
          <span>損失固定計: <b class="pneg">${fn(sonTotal)}円</b></span>
          <span>決済累計利益: <b class="${settledProfit>=0?'ppos':'pneg'}">${settledProfit>=0?'+':''}${fn(Math.round(settledProfit))}円</b></span>
          <span>残り必要利益: <b class="${remaining>0?'pneg':'ppos'}">${remaining>0?'-'+fn(Math.round(remaining)):'達成！'}</b></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--blue)'}"></div>
        </div>
        <div style="font-size:10px;color:var(--sub);margin-top:2px">${pct}% 回収済み</div>
      </div>`:''}
    </div>`;
  }

  function rComboSection(){
    if(n<2)return '';
    const combos=[];
    for(let mask=0;mask<(1<<n);mask++){
      const bits=[];
      for(let i=0;i<n;i++) if(mask&(1<<i)) bits.push(i);
      if(bits.length>=2) combos.push(bits);
    }
    function calcCombo(bits){
      const ps=bits.map(i=>pos[i]);
      const label=bits.map(i=>LABS[i]).join('+');
      const bs=ps.filter(e=>e.colType==='buy');
      const ss=ps.filter(e=>e.colType==='sell');
      const buysSum=bs.reduce((s,e)=>s+(e.price||0),0);
      const sellsSum=ss.reduce((s,e)=>s+(e.price||0),0);
      const netCount=bs.length-ss.length;
      const posStr=ps.map(e=>{
        const cl=e.colType==='buy'?'tb':'ts';
        const mk=e.colType==='buy'?'○':'×';
        return '<span class="'+cl+'">'+mk+fn(e.price)+'</span>';
      }).join('<span style="color:var(--muted);margin:0 1px">+</span>');
      let resH='';
      if(netCount===0){
        const fixed=sellsSum-buysSum;
        const cl=fixed>=0?'ppos':'pneg';
        resH='<span class="sosai-res '+cl+'">'+(fixed>=0?'+':'')+fn(fixed*sh)+'円<span class="sosai-fix">(固定'+(fixed>=0?'益':'損')+')</span></span>';
      } else if(netCount>0){
        const be=Math.round((buysSum-sellsSum)/netCount);
        const ok=curP&&curP>be;
        const prof1=ok?Math.round((curP-be)*netCount*sh):null;
        resH='<span class="sosai-res '+(ok?'sosai-ok':'sosai-ng')+'">'+fn(be)+'↑'+(ok?'<span class="sosai-achieved">✓達成 +'+fn(prof1)+'円</span>':'')+'</span>';
      } else {
        const be=Math.round((sellsSum-buysSum)/(-netCount));
        const ok=curP&&curP<be;
        const prof2=ok?Math.round((be-curP)*(-netCount)*sh):null;
        resH='<span class="sosai-res '+(ok?'sosai-ok':'sosai-ng')+'">'+fn(be)+'↓'+(ok?'<span class="sosai-achieved">✓達成 +'+fn(prof2)+'円</span>':'')+'</span>';
      }
      let sortKey=0;
      if(netCount===0){sortKey=sellsSum-buysSum;}
      else if(netCount>0&&curP){const be2=Math.round((buysSum-sellsSum)/netCount);sortKey=curP>be2?Math.round((curP-be2)*netCount*sh):-(be2-curP)*netCount*sh;}
      else if(netCount<0&&curP){const be2=Math.round((sellsSum-buysSum)/(-netCount));sortKey=curP<be2?Math.round((be2-curP)*(-netCount)*sh):-(curP-be2)*(-netCount)*sh;}
      return {label,posStr,resH,size:bits.length,sortKey};
    }
    const bySize={};
    combos.forEach(bits=>{
      const r=calcCombo(bits);
      if(!bySize[r.size])bySize[r.size]=[];
      bySize[r.size].push(r);
    });
    Object.values(bySize).forEach(rs=>rs.sort((a,b)=>b.sortKey-a.sortKey));
    const sections=Object.entries(bySize).map(([sz,rs])=>`
      <div class="sosai-group">
        <div class="sosai-group-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none';this.querySelector('.sg-arrow').textContent=this.nextElementSibling.style.display===''?'▾':'▸'">
          ${sz}点相殺 <span style="font-size:10px;color:var(--muted)">(${rs.length}件)</span>
          <span class="sg-arrow">▾</span>
        </div>
        <div class="sosai-body">
          ${rs.map(r=>`
            <div class="sosai-row">
              <span class="sosai-lbl">${r.label}</span>
              <span class="sosai-pos">${r.posStr}</span>
              ${r.resH}
            </div>`).join('')}
        </div>
      </div>`).join('');
    const legend=pos.map((e,i)=>{
      const cl=e.colType==='buy'?'tb':'ts';
      const mk=e.colType==='buy'?'○':'×';
      return `<span style="margin-right:8px"><b>${LABS[i]}</b>:<span class="${cl}">${mk}</span>${fd(e.date)} ${fn(e.price)}円</span>`;
    }).join('');
    return `<div class="kf-section" style="padding-bottom:0;border-bottom:none">
      <div class="kf-title">🔀 相殺シミュレーション
        <span style="font-size:10px;color:var(--sub);font-weight:400">${legend}</span>
        ${curP?`<span style="margin-left:auto;font-size:11px">現在値: <b>${fn(curP)}円</b></span>`:''}
      </div>
      <div class="sosai-wrap" style="padding:0 0 8px 0">${sections}</div>
    </div>`;
  }

  const hasContent=n>=2||fixedPairs.length>0;
  if(!hasContent){
    return `<div class="card">
      <div class="ch">⚖️ 相殺・固定管理
        <span style="font-size:10px;color:var(--sub);font-weight:400">グループ ${NUMS[S.gi]} の未決済2件以上で表示</span>
      </div>
      <div class="cb" style="color:var(--sub);font-size:11px">未決済ポジションが2件以上になると表示されます</div>
    </div>`;
  }

  return `<div class="card">
    <div class="ch">⚖️ 相殺・固定管理
      <span style="font-size:10px;color:var(--sub);font-weight:400">グループ ${NUMS[S.gi]}</span>
    </div>
    ${rFixedSection()}
    ${rJisaSection()}
    ${rComboSection()}
  </div>`;
}


/* ─── ボトム ─── */
function rBottom(){
  const mp=monthProfit();const prev=Number(S.prevP)||0;const total=prev+Math.round(mp);
  const mcl=mp>0?'ppos':mp<0?'pneg':'';const tcl=total>0?'ppos':total<0?'pneg':'';
  return `
    <div class="card">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0;border-bottom:1px solid var(--border)">
        <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap">📊 今月利益確定</span>
          <span class="tbig ${mcl}" style="font-size:16px">${mp!==0?(mp>0?'+':'')+fn(Math.round(mp))+'円':'0円'}</span>
        </div>
        <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap">先月までの累計</span>
          <input type="number" style="width:110px;text-align:right" value="${S.prevP}" placeholder="0" oninput="S.prevP=this.value;R()">
          <span style="font-size:12px">円</span>
        </div>
        <div style="padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:6px">
          <span class="op" style="font-size:16px">＋</span>
          <span class="tbig ${mcl}">${fn(Math.round(mp))}円</span>
          <span class="op" style="font-size:16px">＝</span>
        </div>
        <div style="padding:8px 16px;display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:var(--sub)">累計</span>
          <span class="tbig ${tcl}" style="font-size:20px">${fn(total)}円</span>
        </div>
      </div>
    </div>`;
}

// 起動時ロード
lsLoadMeta();
lsLoadPrices();
lsLoadExt();
if(!lsLoadMonth(S.year,S.month)){
  resetMonthData();
  applyCarryOver(S.year,S.month);
  const pp=calcPrevMonthProfit(S.year,S.month);
  if(pp&&!S.prevP)S.prevP=String(pp);
}
R();</script>
